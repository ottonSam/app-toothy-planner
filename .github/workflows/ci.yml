name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validar aplicação web
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar lint e formatação
        run: npm run lint

      - name: Validar tipos
        run: npm run typecheck

      - name: Gerar aplicação web
        run: npm run web:build

      - name: Validar artefatos PWA
        run: |
          test -f dist/manifest.json
          test -f dist/sw.js
          test -f dist/icons/icon-192.png
          test -f dist/icons/icon-512.png
          grep -q 'rel="manifest"' dist/index.html
          if grep -qE 'precacheAndRoute|caches\.open|cache\.put' dist/sw.js; then
            echo "O service worker não deve manter cache offline."
            exit 1
          fi

      - name: Validar imagem Docker
        run: docker build --tag toothy-planner-web:ci .

      - name: Validar variáveis de ambiente no container
        run: |
          cleanup() {
            docker rm --force toothy-planner-web-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run --detach \
            --name toothy-planner-web-ci \
            --env EXPO_PUBLIC_API_BASE_URL=/api/v1 \
            --env API_PROXY_ORIGIN=https://api.example.com \
            toothy-planner-web:ci

          for attempt in {1..20}; do
            if docker exec toothy-planner-web-ci wget --spider http://127.0.0.1/; then
              break
            fi
            if [ "$attempt" -eq 20 ]; then
              exit 1
            fi
            sleep 1
          done

          docker exec toothy-planner-web-ci \
            grep -R -q '/api/v1' /usr/share/nginx/html
          docker exec toothy-planner-web-ci sh -c \
            "! grep -R -q 'https://api.example.com' /usr/share/nginx/html"
          docker exec toothy-planner-web-ci sh -c \
            "nginx -T 2>&1 | grep -q 'proxy_pass https://api.example.com'"
          docker exec toothy-planner-web-ci sh -c \
            "nginx -T 2>&1 | grep -q 'proxy_cookie_domain'"
          docker exec toothy-planner-web-ci \
            test -f /usr/share/nginx/html/manifest.json
          docker exec toothy-planner-web-ci \
            test -f /usr/share/nginx/html/sw.js
          docker exec toothy-planner-web-ci sh -c \
            "wget -S -O /dev/null http://127.0.0.1/manifest.json 2>&1 |
            grep -i 'Content-Type: application/manifest+json'"
          docker exec toothy-planner-web-ci sh -c \
            "wget -S -O /dev/null http://127.0.0.1/sw.js 2>&1 |
            grep -i 'Cache-Control: no-cache, no-store, must-revalidate'"
