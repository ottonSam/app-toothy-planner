services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${WEB_CONTAINER_NAME:-toothy-planner-web}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL}
      API_PROXY_ORIGIN: ${API_PROXY_ORIGIN:-http://host.docker.internal:8080}
    ports:
      - '${WEB_PORT:-8014}:80'
